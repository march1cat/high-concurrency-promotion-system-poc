server:
  port: 8082
spring:
  datasource:
    url: jdbc:mariadb://192.168.0.186:3306/promo_db
    username: root
    password: test
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      # 'update' creates/modifies tables automatically based on your Entity classes
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true