server:
  port: 8081
spring:
  datasource:
    primary:
      url: jdbc:mariadb://192.168.0.186:3306/product_db_primary
      username: root
      password: test
      driver-class-name: org.mariadb.jdbc.Driver
    replica:
      url: jdbc:mariadb://192.168.0.186:3306/product_db_replica
      username: root
      password: test
      driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      # 'update' creates/modifies tables automatically based on your Entity classes
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true



